<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hotel LBI · Beach Weather</title>
  <style>
      :root {
            --sand: #f4ecdd;
            --sand-deep: #e6d8b8;
            --sea: #2b6a8a;
            --sea-light: #6fb3c9;
            --sun: #f5b642;
            --ink: #1c2a33;
            --card: rgba(255,255,255,0.78);
            --shadow: 0 8px 30px rgba(28,42,51,0.12);
            --radius: 18px;
            --font: "Helvetica Neue", "Segoe UI", system-ui, sans-serif;
      }
      * { box-sizing: border-box; }
      body {
            margin: 0;
            font-family: var(--font);
            color: var(--ink);
            background: linear-gradient(180deg, #cfe7f1 0%, #f4ecdd 70%, #e6d8b8 100%);
            min-height: 100vh;
            padding: 32px 16px 64px;
      }
      header { text-align: center; margin-bottom: 28px; }
      .brand { letter-spacing: 0.35em; font-size: 12px; color: var(--sea); text-transform: uppercase; }
      h1 { font-weight: 300; font-size: clamp(28px, 4vw, 44px); margin: 6px 0 4px; }
      .sub { color: #5b6b75; font-size: 14px; }
      .wrap { max-width: 980px; margin: 0 auto; }
      .now { background: var(--card); backdrop-filter: blur(8px); border-radius: var(--radius); box-shadow: var(--shadow); padding: 28px; display: grid; grid-template-columns: 1fr 1fr; gap: 18px; align-items: center; }
      .temp { font-size: clamp(64px, 10vw, 104px); font-weight: 200; line-height: 1; }
      .temp small { font-size: 0.35em; color: #5b6b75; margin-left: 6px; }
      .cond { font-size: 18px; color: var(--sea); margin-top: 6px; }
      .icon { font-size: 72px; text-align: right; }
      .stats { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-top: 14px; border-top: 1px solid rgba(0,0,0,0.06); padding-top: 18px; }
      .stat { text-align: center; }
      .stat .lbl { font-size: 11px; letter-spacing: 0.12em; color: #5b6b75; text-transform: uppercase; }
      .stat .val { font-size: 18px; margin-top: 4px; }
      h2 { font-weight: 400; font-size: 14px; letter-spacing: 0.2em; color: var(--sea); text-transform: uppercase; margin: 36px 0 12px; }
      .forecast { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
      .day { background: var(--card); border-radius: 14px; padding: 14px 8px; text-align: center; box-shadow: var(--shadow); }
      .day .d { font-size: 12px; letter-spacing: 0.1em; color: #5b6b75; text-transform: uppercase; }
      .day .e { font-size: 32px; margin: 6px 0; }
      .day .h { font-size: 16px; }
      .day .l { font-size: 13px; color: #5b6b75; }
      .beach { margin-top: 24px; background: linear-gradient(135deg, var(--sea) 0%, var(--sea-light) 100%); color: white; border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow); }
      .beach h3 { margin: 0 0 10px; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; font-size: 13px; opacity: 0.9; }
      .beach-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px; }
      .beach .stat .lbl { color: rgba(255,255,255,0.75); }
      .beach .stat .val { color: #fff; }
      footer { text-align: center; color: #5b6b75; font-size: 12px; margin-top: 40px; }
      @media (max-width: 640px) {
            .now { grid-template-columns: 1fr; text-align: center; }
            .icon { text-align: center; }
            .forecast { grid-template-columns: repeat(4, 1fr); }
      }
    </style>
  </head>
  <body>
      <div class="wrap">
            <header>
                    <div class="brand">Hotel LBI</div>div>
                    <h1>Long Beach Island Forecast</h1>
                  <div class="sub" id="updated">Loading conditions…</div>div>
            </header>
          <section class="now" id="now" aria-live="polite">
                <div>
                          <div class="temp" id="temp">—<small>°F</small></div>
                        <div class="cond" id="cond">—</div>
                </div>
                <div class="icon" id="icon">⛅</div>
                <div class="stats">
                        <div class="stat"><div class="lbl">Feels Like</div><div class="val" id="feels">—</div></div>
                        <div class="stat"><div class="lbl">Humidity</div><div class="val" id="hum">—</div></div>
                        <div class="stat"><div class="lbl">Wind</div><div class="val" id="wind">—</div></div>
                        <div class="stat"><div class="lbl">UV Index</div><div class="val" id="uv">—</div></div>
                        <div class="stat"><div class="lbl">Sunrise</div><div class="val" id="sunrise">—</div></div>
                        <div class="stat"><div class="lbl">Sunset</div><div class="val" id="sunset">—</div></div>
                </div>
          </section>section>
          <h2>7-Day Forecast</h2>
          <div class="forecast" id="forecast"></div>
          <div class="beach">
                <h3>At the Beach Today</h3>
                <div class="beach-grid">
                        <div class="stat"><div class="lbl">Precip Chance</div><div class="val" id="precip">—</div></div>
                        <div class="stat"><div class="lbl">Wind Direction</div><div class="val" id="windDir">—</div></div>
                        <div class="stat"><div class="lbl">Beach Day Score</div><div class="val" id="score">—</div></div>
                </div>
          </div>
          <footer>Data: Open-Meteo · Long Beach Island, NJ</footer>
      </div>
  <script>
      const LAT = 39.6453, LON = -74.1879;
      const WMO = {
            0:["Clear sky","☀️"], 1:["Mainly clear","🌤️"], 2:["Partly cloudy","⛅"], 3:["Overcast","☁️"],
            45:["Fog","🌫️"], 48:["Rime fog","🌫️"],
            51:["Light drizzle","🌦️"], 53:["Drizzle","🌦️"], 55:["Heavy drizzle","🌧️"],
            61:["Light rain","🌦️"], 63:["Rain","🌧️"], 65:["Heavy rain","🌧️"],
            71:["Light snow","🌨️"], 73:["Snow","🌨️"], 75:["Heavy snow","❄️"],
            80:["Showers","🌦️"], 81:["Showers","🌧️"], 82:["Violent showers","⛈️"],
            95:["Thunderstorm","⛈️"], 96:["Thunderstorm w/ hail","⛈️"], 99:["Severe thunderstorm","⛈️"]
      };
      const dirName = d => ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"][Math.round(d/22.5)%16];
      const fmtTime = iso => new Date(iso).toLocaleTimeString([], {hour:"numeric", minute:"2-digit"});
      const fmtDay = iso => new Date(iso).toLocaleDateString([], {weekday:"short"});
      function beachScore({temp, wind, uv, precip, code}) {
            let s = 100;
            if (temp < 70) s -= (70 - temp) * 3;
            if (temp > 90) s -= (temp - 90) * 3;
            if (wind > 15) s -= (wind - 15) * 2;
            if (precip > 20) s -= precip * 0.6;
            if ([61,63,65,80,81,82,95,96,99].includes(code)) s -= 40;
            if (uv > 8) s -= 10;
            s = Math.max(0, Math.min(100, Math.round(s)));
            const label = s >= 80 ? "Excellent" : s >= 60 ? "Good" : s >= 40 ? "Fair" : "Stay In";
            return s + " · " + label;
      }
      async function load() {
            const url = "https://api.open-meteo.com/v1/forecast?latitude=" + LAT + "&longitude=" + LON +
                    "&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,uv_index,precipitation_probability" +
                    "&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,uv_index_max,precipitation_probability_max" +
                    "&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=America%2FNew_York";
            const res = await fetch(url);
            const data = await res.json();
            const c = data.current;
            const wm = WMO[c.weather_code] || ["—","⛅"];
            document.getElementById("temp").innerHTML = Math.round(c.temperature_2m) + "<small>°F</small>";
            document.getElementById("cond").textContent = wm[0];
            document.getElementById("icon").textContent = wm[1];
            document.getElementById("feels").textContent = Math.round(c.apparent_temperature) + "°";
            document.getElementById("hum").textContent = c.relative_humidity_2m + "%";
            document.getElementById("wind").textContent = Math.round(c.wind_speed_10m) + " mph";
            document.getElementById("uv").textContent = (c.uv_index != null) ? c.uv_index.toFixed(1) : "—";
            document.getElementById("sunrise").textContent = fmtTime(data.daily.sunrise[0]);
            document.getElementById("sunset").textContent = fmtTime(data.daily.sunset[0]);
            document.getElementById("updated").textContent = "Updated " + new Date().toLocaleTimeString([], {hour:"numeric", minute:"2-digit"}) + " · Ship Bottom, NJ";
            document.getElementById("precip").textContent = data.daily.precipitation_probability_max[0] + "%";
            document.getElementById("windDir").textContent = dirName(c.wind_direction_10m) + " (" + Math.round(c.wind_direction_10m) + "°)";
            document.getElementById("score").textContent = beachScore({
                    temp: c.temperature_2m, wind: c.wind_speed_10m, uv: c.uv_index || 0,
                    precip: data.daily.precipitation_probability_max[0], code: c.weather_code
            });
            const fc = document.getElementById("forecast");
            fc.innerHTML = "";
            for (let i = 0; i < 7; i++) {
                    const w = WMO[data.daily.weather_code[i]] || ["—","⛅"];
                    const el = document.createElement("div");
                    el.className = "day";
                    el.innerHTML = '<div class="d">' + (i === 0 ? "Today" : fmtDay(data.daily.time[i])) +
                              '</div><div class="e" title="' + w[0] + '">' + w[1] + '</div>' +
                              '<div class="h">' + Math.round(data.daily.temperature_2m_max[i]) + '°</div>' +
                              '<div class="l">' + Math.round(data.daily.temperature_2m_min[i]) + '°</div>';
                    fc.appendChild(el);
            }
      }
      load().catch(err => {
            document.getElementById("updated").textContent = "Couldn't load weather. Try again shortly.";
            console.error(err);
      });
  </script>
  </body>
</html>
