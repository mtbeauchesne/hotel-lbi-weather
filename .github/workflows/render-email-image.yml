name: Render email widget image

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/render-email-image.mjs"
      - "package.json"
      - ".github/workflows/render-email-image.yml"

permissions:
  contents: write

concurrency:
  group: render-email-image
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci || npm install

      - run: npm run render

      - name: Commit rendered assets
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add email/widget.svg email/widget.png
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(email): refresh widget assets [skip ci]"
            git push
          fi
