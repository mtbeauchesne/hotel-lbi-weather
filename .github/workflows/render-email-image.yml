name: Render email image

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/render-email-image.mjs"
      - ".github/workflows/render-email-image.yml"
      - "package.json"

permissions:
  contents: write

concurrency:
  group: render-email-image
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Download brand fonts (Prata + Montserrat)
        run: |
          mkdir -p fonts
          # Prata (serif headings)
          curl -fsSL "https://github.com/google/fonts/raw/main/ofl/prata/Prata-Regular.ttf" -o fonts/Prata-Regular.ttf
          # Montserrat (sans-serif labels)
          curl -fsSL "https://github.com/google/fonts/raw/main/ofl/montserrat/static/Montserrat-Regular.ttf" -o fonts/Montserrat-Regular.ttf
          curl -fsSL "https://github.com/google/fonts/raw/main/ofl/montserrat/static/Montserrat-Medium.ttf" -o fonts/Montserrat-Medium.ttf
          ls -la fonts/

      - name: Render
        run: node scripts/render-email-image.mjs

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add email/widget.svg email/widget.png
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(email): refresh widget [skip ci]"
            git push
          fi
