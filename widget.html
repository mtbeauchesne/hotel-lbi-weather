<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hotel LBI Weather Widget</title>
  <style>
      body { margin: 0; font-family: "Helvetica Neue", "Segoe UI", system-ui, sans-serif; color: #1c2a33; background: linear-gradient(135deg, #6fb3c9 0%, #2b6a8a 100%); }
      .card { width: 100%; max-width: 600px; margin: 0 auto; padding: 20px 24px; color: #fff; }
      .top { display: flex; align-items: center; justify-content: space-between; }
      .label { font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; opacity: 0.85; }
      .place { font-size: 18px; font-weight: 300; margin-top: 2px; }
      .temp { font-size: 56px; font-weight: 200; line-height: 1; }
      .temp small { font-size: 0.4em; opacity: 0.8; margin-left: 4px; }
      .icon { font-size: 56px; }
      .cond { font-size: 14px; opacity: 0.9; margin-top: 4px; }
      .row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 16px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.25); }
      .day { text-align: center; font-size: 12px; }
      .day .e { font-size: 22px; margin: 4px 0 2px; }
      .day .h { font-weight: 500; }
      .day .l { opacity: 0.7; font-size: 11px; }
      .meta { display: flex; justify-content: space-between; margin-top: 12px; font-size: 12px; opacity: 0.85; }
      a.cta { display: inline-block; margin-top: 14px; padding: 8px 16px; background: rgba(255,255,255,0.18); color: #fff; text-decoration: none; border-radius: 999px; font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; }
    </style>
  </head>
  <body>
      <div class="card">
            <div class="top">
                    <div>
                              <div class="label">Hotel LBI</div>
                              <div class="place">Long Beach Island, NJ</div>
                              <div class="temp" id="temp">—<small>°F</small></div>
                            <div class="cond" id="cond">Loading…</div>
                    </div>
                  <div class="icon" id="icon">⛅</div>
            </div>
          <div class="row" id="row"></div>
          <div class="meta">
                <span id="m1">Sunrise —</span>span>
                <span id="m2">Sunset —</span>span>
                <span id="m3">Wind —</span>span>
          </div>
          <a class="cta" href="https://mtbeauchesne.github.io/hotel-lbi-weather/" target="_blank" rel="noopener">View Full Forecast →</a>a>
      </div>
  <script>
      const LAT = 39.6453, LON = -74.1879;
      const WMO = {0:["Clear","☀️"],1:["Mainly clear","🌤️"],2:["Partly cloudy","⛅"],3:["Overcast","☁️"],45:["Fog","🌫️"],48:["Fog","🌫️"],51:["Drizzle","🌦️"],53:["Drizzle","🌦️"],55:["Drizzle","🌧️"],61:["Rain","🌦️"],63:["Rain","🌧️"],65:["Heavy rain","🌧️"],71:["Snow","🌨️"],73:["Snow","🌨️"],75:["Snow","❄️"],80:["Showers","🌦️"],81:["Showers","🌧️"],82:["Showers","⛈️"],95:["Storm","⛈️"],96:["Storm","⛈️"],99:["Storm","⛈️"]};
      const fmtTime = iso => new Date(iso).toLocaleTimeString([], {hour:"numeric", minute:"2-digit"});
      const fmtDay = iso => new Date(iso).toLocaleDateString([], {weekday:"short"});
      async function load() {
            const url = "https://api.open-meteo.com/v1/forecast?latitude=" + LAT + "&longitude=" + LON +
                    "&current=temperature_2m,weather_code,wind_speed_10m" +
                    "&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset" +
                    "&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=America%2FNew_York";
            const data = await (await fetch(url)).json();
            const c = data.current;
            const w = WMO[c.weather_code] || ["—","⛅"];
            document.getElementById("temp").innerHTML = Math.round(c.temperature_2m) + "<small>°F</small>";
            document.getElementById("cond").textContent = w[0];
            document.getElementById("icon").textContent = w[1];
            document.getElementById("m1").textContent = "Sunrise " + fmtTime(data.daily.sunrise[0]);
            document.getElementById("m2").textContent = "Sunset " + fmtTime(data.daily.sunset[0]);
            document.getElementById("m3").textContent = "Wind " + Math.round(c.wind_speed_10m) + " mph";
            const row = document.getElementById("row");
            row.innerHTML = "";
            for (let i = 0; i < 7; i++) {
                    const ww = WMO[data.daily.weather_code[i]] || ["—","⛅"];
                    const d = document.createElement("div");
                    d.className = "day";
                    d.innerHTML = (i === 0 ? "Today" : fmtDay(data.daily.time[i])) +
                              '<div class="e">' + ww[1] + '</div>' +
                              '<div class="h">' + Math.round(data.daily.temperature_2m_max[i]) + '°</div>' +
                              '<div class="l">' + Math.round(data.daily.temperature_2m_min[i]) + '°</div>';
                    row.appendChild(d);
            }
      }
      load().catch(() => { document.getElementById("cond").textContent = "Weather unavailable"; });
  </script>
  </body>
</html>
